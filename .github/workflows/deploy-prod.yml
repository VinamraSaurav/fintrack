name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy-api:
    name: Deploy API to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.confirm == 'deploy'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Deploy Worker to Production
        run: cd apps/api && npx wrangler deploy

      - name: Set Secrets
        run: |
          echo "${{ secrets.CLERK_SECRET_KEY }}" | cd apps/api && npx wrangler secret put CLERK_SECRET_KEY
          echo "${{ secrets.CLERK_PUBLISHABLE_KEY }}" | cd apps/api && npx wrangler secret put CLERK_PUBLISHABLE_KEY
          echo "${{ secrets.RESEND_API_KEY }}" | cd apps/api && npx wrangler secret put RESEND_API_KEY

      - name: Run D1 Migrations
        run: cd apps/api && npx wrangler d1 migrations apply fintrack-db --remote

  # Frontend auto-deploys via Vercel Git integration
