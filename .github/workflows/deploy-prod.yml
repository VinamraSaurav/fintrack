name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-api:
    name: Deploy API to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.confirm == 'deploy'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Deploy Worker to Production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: deploy

      - name: Set Clerk Secret Key
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: secret put CLERK_SECRET_KEY
          input: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Set Clerk Publishable Key
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: secret put CLERK_PUBLISHABLE_KEY
          input: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

      - name: Set Resend API Key
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: secret put RESEND_API_KEY
          input: ${{ secrets.RESEND_API_KEY }}

      - name: Run D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: d1 migrations apply fintrack-db --remote

  # Frontend auto-deploys via Vercel Git integration
