name: Deploy Staging

on:
  push:
    branches: [main]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy-api:
    name: Deploy API to Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Deploy Worker to Staging
        run: cd apps/api && npx wrangler deploy --env staging

      - name: Set Secrets
        run: |
          echo "${{ secrets.CLERK_SECRET_KEY }}" | cd apps/api && npx wrangler secret put CLERK_SECRET_KEY --env staging
          echo "${{ secrets.CLERK_PUBLISHABLE_KEY }}" | cd apps/api && npx wrangler secret put CLERK_PUBLISHABLE_KEY --env staging
          echo "${{ secrets.RESEND_API_KEY }}" | cd apps/api && npx wrangler secret put RESEND_API_KEY --env staging

      - name: Run D1 Migrations
        run: cd apps/api && npx wrangler d1 migrations apply fintrack-db-staging --remote --env staging

  # Frontend auto-deploys via Vercel Git integration
