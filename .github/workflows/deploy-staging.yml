name: Deploy Staging

on:
  push:
    branches: [main]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-api:
    name: Deploy API to Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Deploy Worker to Staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set Clerk Secret Key
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: secret put CLERK_SECRET_KEY --env staging
          input: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Set Clerk Publishable Key
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: secret put CLERK_PUBLISHABLE_KEY --env staging
          input: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

      - name: Set Resend API Key
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: secret put RESEND_API_KEY --env staging
          input: ${{ secrets.RESEND_API_KEY }}

      - name: Run D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: d1 migrations apply fintrack-db-staging --remote --env staging

  # Frontend auto-deploys via Vercel Git integration
