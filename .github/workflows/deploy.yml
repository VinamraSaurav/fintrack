name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Deploy Worker to Staging
        working-directory: apps/api
        run: npx wrangler deploy --env staging

      - name: Run D1 Migrations (Staging)
        working-directory: apps/api
        run: npx wrangler d1 migrations apply fintrack-db-staging --remote --env staging

  deploy-prod:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Deploy Worker to Production
        working-directory: apps/api
        run: npx wrangler deploy

      - name: Run D1 Migrations (Production)
        working-directory: apps/api
        run: npx wrangler d1 migrations apply fintrack-db --remote

  # Frontend auto-deploys via Vercel Git integration (both preview + production)
